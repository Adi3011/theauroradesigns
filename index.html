<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>The Aurora Designs</title>
  <meta name="description" content="Creative Design Studio — Find us on YouTube, Facebook & Instagram" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Jost:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh;
      background: #07071a;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: 'Jost', sans-serif;
      padding: 24px 16px;
    }
    .aurora-bg { position: fixed; inset: 0; z-index: 0; overflow: hidden; pointer-events: none; }
    .aurora-bg::before, .aurora-bg::after, .aurora-bg .blob3 { content: ''; position: absolute; border-radius: 50%; filter: blur(80px); opacity: 0.22; }
    .aurora-bg::before { width: 500px; height: 400px; top: -100px; left: -100px; background: radial-gradient(circle, #a78bfa, transparent 70%); animation: drift1 12s ease-in-out infinite alternate; }
    .aurora-bg::after { width: 450px; height: 400px; bottom: -80px; right: -80px; background: radial-gradient(circle, #38bdf8, transparent 70%); animation: drift2 14s ease-in-out infinite alternate; }
    .blob3 { display: block; width: 350px; height: 300px; top: 30%; right: 10%; background: radial-gradient(circle, #34d399, transparent 70%); opacity: 0.14; animation: drift3 16s ease-in-out infinite alternate; }
    @keyframes drift1 { from { transform: translate(0,0); } to { transform: translate(60px, 40px); } }
    @keyframes drift2 { from { transform: translate(0,0); } to { transform: translate(-50px, -40px); } }
    @keyframes drift3 { from { transform: translate(0,0); } to { transform: translate(-40px, 30px); } }
    .card {
      position: relative; z-index: 1; width: 100%; max-width: 420px;
      background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.08);
      border-radius: 28px; padding: 44px 28px 36px;
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      display: flex; flex-direction: column; align-items: center;
    }
    .logo-ring {
      width: 100px; height: 100px; border-radius: 50%;
      background: linear-gradient(135deg, #a78bfa 0%, #38bdf8 50%, #34d399 100%);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 16px;
      box-shadow: 0 0 40px rgba(167,139,250,0.4), 0 0 80px rgba(56,189,248,0.15);
    }
    .logo-inner-wrap {
      width: 86px; height: 86px; border-radius: 50%;
      overflow: hidden; background: #0d0d1f;
    }
    .logo-inner-wrap img {
      width: 100%; height: 100%; object-fit: cover; border-radius: 50%;
    }
    .name { font-family: 'Cormorant Garamond', serif; font-size: 28px; font-weight: 600; color: #fff; letter-spacing: 2.5px; margin-bottom: 6px; text-align: center; }
    .tagline { font-size: 11px; font-weight: 300; letter-spacing: 3.5px; color: rgba(180,160,255,0.65); text-transform: uppercase; margin-bottom: 32px; text-align: center; }
    .links { width: 100%; display: flex; flex-direction: column; gap: 12px; }
    .link-btn { display: flex; align-items: center; gap: 14px; padding: 15px 18px; border-radius: 16px; text-decoration: none; border: 1px solid transparent; transition: transform 0.2s ease, box-shadow 0.2s ease, border-color 0.2s ease; }
    .link-btn:hover { transform: translateY(-3px); }
    .link-btn:focus-visible { outline: 2px solid #a78bfa; outline-offset: 3px; }
    .link-btn.yt { background: rgba(255,55,55,0.1); border-color: rgba(255,80,80,0.2); }
    .link-btn.yt:hover { box-shadow: 0 8px 28px rgba(255,55,55,0.2); border-color: rgba(255,80,80,0.4); }
    .link-btn.fb { background: rgba(66,103,212,0.1); border-color: rgba(80,120,255,0.2); }
    .link-btn.fb:hover { box-shadow: 0 8px 28px rgba(66,103,212,0.2); border-color: rgba(80,120,255,0.4); }
    .link-btn.ig { background: rgba(225,48,108,0.1); border-color: rgba(225,70,140,0.2); }
    .link-btn.ig:hover { box-shadow: 0 8px 28px rgba(225,48,108,0.2); border-color: rgba(225,70,140,0.4); }
    .icon-wrap { width: 40px; height: 40px; border-radius: 11px; display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
    .yt .icon-wrap { background: rgba(255,55,55,0.15); }
    .fb .icon-wrap { background: rgba(66,103,212,0.15); }
    .ig .icon-wrap { background: rgba(225,48,108,0.15); }
    .link-label { flex: 1; }
    .link-label .platform { font-size: 10px; font-weight: 400; letter-spacing: 2.5px; text-transform: uppercase; margin-bottom: 2px; }
    .link-label .handle { font-size: 14px; font-weight: 500; color: #fff; }
    .yt .platform { color: rgba(255,120,120,0.8); }
    .fb .platform { color: rgba(130,160,255,0.8); }
    .ig .platform { color: rgba(255,120,180,0.8); }
    .arrow { color: rgba(255,255,255,0.25); flex-shrink: 0; }
    .divider { width: 36px; height: 1px; background: rgba(255,255,255,0.1); margin: 28px 0 18px; }
    .footer { font-size: 11px; color: rgba(255,255,255,0.2); letter-spacing: 2px; text-align: center; }
    @media (prefers-reduced-motion: reduce) { .aurora-bg::before, .aurora-bg::after, .blob3 { animation: none; } .link-btn { transition: none; } }
  </style>
</head>
